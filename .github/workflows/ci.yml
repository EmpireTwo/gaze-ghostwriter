name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        stability: [prefer-stable]
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / ${{ matrix.stability }}

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, mbstring, pdo, sqlite, pdo_sqlite
          coverage: none
          tools: composer:v2
      - name: Pin Laravel ${{ matrix.laravel }} / Testbench ${{ matrix.testbench }}
        run: |
          composer require \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}" \
            "illuminate/notifications:${{ matrix.laravel }}" \
            "illuminate/queue:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            --no-interaction --no-update
          composer require --dev \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
      - name: Composer install
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress
      - name: Pest
        run: vendor/bin/pest
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress
      - name: Pint
        run: vendor/bin/pint --test
